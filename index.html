const b2u = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  if(!pw){ err.textContent = 'パスワードを入力してください'; return; }
  err.textContent = '復号中…';
  try{
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b2u(SALT), iterations:250000, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b2u(IV)}, key, b2u(CT));
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  }catch(e){
    err.textContent = 'パスワードが違います';
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
